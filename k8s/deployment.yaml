apiVersion: apps/v1
kind: Deployment

metadata:
  name: fastapi-deployment

spec:
  replicas: 5

  selector:
    matchLabels:
      app: fastapi

  template:
    metadata:
      labels:
        app: fastapi

    spec:
      containers:
      - name: fastapi-container
        image: harithakk/fastapi-hello:v2
        imagePullPolicy: Always
        ports:
        - containerPort: 8000